<header class="header">

    <div>
        <h1>
            {{name}}
        </h1>

        <div class="desired-position">
            {{desired_position}}
        </div>

    </div>

    <div class="contact">

    <div>
        {{phone}}
    </div>

    <div>
        {{email}}
    </div>

    <div class="profile-links">
    <a
        class="profile-link"
        href="{{portfolio}}"
        target="_blank"
        rel="noopener noreferrer"
    >
        <svg
            class="profile-link-icon"
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
        >
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M2 12h20"></path>
            <path d="M12 2a15.3 15.3 0 0 1 0 20"></path>
            <path d="M12 2a15.3 15.3 0 0 0 0 20"></path>
        </svg>

        <span>Portfolio</span>
    </a>

    <span class="profile-link-separator">|</span>

    <a
        class="profile-link"
        href="{{github}}"
        target="_blank"
        rel="noopener noreferrer"
    >
        <svg
            class="profile-link-icon"
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
        >
            <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3.28-.36 6.72-1.61 6.72-7A5.4 5.4 0 0 0 19.3 3.75 5 5 0 0 0 19.16 0S18 -.36 15 1.48a13.38 13.38 0 0 0-7 0C5-.36 3.84 0 3.84 0a5 5 0 0 0-.14 3.75A5.4 5.4 0 0 0 2.28 7.5c0 5.42 3.44 6.67 6.72 7A4.8 4.8 0 0 0 8 18v4"></path>
            <path d="M8 19c-3 .92-3-1.5-4-2"></path>
        </svg>

        <span>GitHub</span>
    </a>
</div>

</div>

</header>
